name: Publish Plots To GitHub Pages

on:
  workflow_dispatch:
  schedule:
    - cron: "0 7 * * *"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: publish-plots-pages
  cancel-in-progress: false

jobs:
  build:
    name: Build Plot Site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Configure GitHub Pages
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5.0.0

      - name: Setup uv
        uses: astral-sh/setup-uv@eac588ad8def6316056a12d4907a9d4d84ff7a3b # v7.3.0
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --frozen

      - name: Download analytics parquet data
        env:
          GH_TOKEN: ${{ github.token }}
        run: >
          uv run python -m qb_notebook.artifacts
          --repo leanprover-community/queueboard-core
          --workflow upload_backup.yaml
          --out-dir ./data
          --artifact-name analytics-datasets
          --branch master
          --search-limit 100

      - name: Generate plot site
        env:
          MPLCONFIGDIR: /tmp/matplotlib
          XDG_CACHE_HOME: /tmp/xdg-cache
        run: uv run python -m qb_notebook.generate_plot_site --data-dir data --site-dir _site

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b # v4.0.0
        with:
          path: _site

  deploy:
    name: Deploy To GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy Pages site
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4.0.5

  workflow-keepalive:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - uses: liskin/gh-workflow-keepalive@f72ff1a1336129f29bf0166c0fd0ca6cf1bcb38c # v1.2.1
